name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run MCP logic tests
      run: |
        # We run the test script. Even if it fails to connect to Prometheus, 
        # as long as the Python code doesn't crash with a Syntax/Import error, the build passes.
        python3 tests/test_mcp.py
